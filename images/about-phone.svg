<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 620" role="img" aria-labelledby="title desc">
  <title id="title">Phone showing PINCS location code</title>
  <desc id="desc">An angled mobile phone over a light map background with a red pin and code label 57W9 1K8Q.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8f8fb"/>
      <stop offset="100%" stop-color="#f2f3f7"/>
    </linearGradient>
    <linearGradient id="phoneBody" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2f3646"/>
      <stop offset="100%" stop-color="#1e2534"/>
    </linearGradient>
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="170%">
      <feDropShadow dx="0" dy="16" stdDeviation="14" flood-color="#20283a" flood-opacity="0.28"/>
    </filter>
    <pattern id="mapGrid" width="74" height="74" patternUnits="userSpaceOnUse">
      <path d="M0 18h74M0 42h74M18 0v74M42 0v74" stroke="#eaecf2" stroke-width="8"/>
      <path d="M0 58h74M58 0v74" stroke="#f0f2f7" stroke-width="10"/>
    </pattern>
  </defs>

  <rect width="800" height="620" fill="url(#bg)"/>
  <rect width="800" height="620" fill="url(#mapGrid)"/>
  <circle cx="98" cy="88" r="22" fill="#f5dfe3" opacity="0.65"/>
  <circle cx="700" cy="134" r="20" fill="#f5dfe3" opacity="0.65"/>
  <path d="M86 360c92-40 168-66 230-79 82-16 181-18 324 14" fill="none" stroke="#ef8f97" stroke-width="4" stroke-linecap="round"/>
  <circle cx="86" cy="360" r="9" fill="#ef6a74"/>
  <circle cx="640" cy="304" r="9" fill="#ef6a74"/>

  <g transform="translate(420 326) rotate(16)" filter="url(#shadow)">
    <rect x="-190" y="-292" width="380" height="580" rx="54" fill="url(#phoneBody)"/>
    <rect x="-170" y="-270" width="340" height="536" rx="40" fill="#f8fafd"/>
    <rect x="-66" y="-286" width="132" height="24" rx="12" fill="#1a2231"/>

    <rect x="-154" y="-252" width="308" height="502" rx="30" fill="#f7f9fc"/>
    <rect x="-154" y="-252" width="308" height="502" rx="30" fill="url(#mapGrid)" opacity="0.86"/>

    <path d="M-128 54c64-28 124-46 178-54 54-8 98-8 132-3" fill="none" stroke="#ee6f78" stroke-width="4" stroke-linecap="round"/>
    <circle cx="-128" cy="54" r="7" fill="#ef6a74"/>
    <circle cx="98" cy="-2" r="7" fill="#ef6a74"/>

    <g transform="translate(-8 -92)">
      <path d="M0-30c-24 0-43 19-43 43 0 30 43 74 43 74s43-44 43-74c0-24-19-43-43-43z" fill="#ef2e35"/>
      <circle cx="0" cy="13" r="14" fill="#ffd5d8"/>
      <circle cx="0" cy="13" r="8" fill="#ffffff"/>
    </g>

    <g transform="translate(-6 86)">
      <rect x="-118" y="-30" width="236" height="60" rx="12" fill="#ffffff" stroke="#dde1ea"/>
      <text x="0" y="10" text-anchor="middle" font-family="Syne, Arial, sans-serif" font-size="48" font-weight="700" fill="#1a1f2a">57W9 1K8Q</text>
    </g>

    <circle cx="0" cy="176" r="12" fill="#278df6"/>
    <circle cx="0" cy="176" r="5" fill="#ffffff"/>
    <rect x="-72" y="228" width="144" height="6" rx="3" fill="#1e2534" opacity="0.35"/>
  </g>
</svg>
